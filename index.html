<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Polus Config</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #10131a;
      color: #f5f7fb;
      display: grid;
      place-items: center;
    }
    main {
      width: min(760px, calc(100vw - 32px));
      background: #181d27;
      border: 1px solid #293142;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .35);
    }
    h1 {
      margin: 0 0 18px;
      font-size: 24px;
    }
    label {
      display: block;
      margin: 18px 0 8px;
      color: #b8c0d4;
      font-size: 14px;
    }
    input {
      box-sizing: border-box;
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #3a455c;
      border-radius: 8px;
      background: #0f131b;
      color: #fff;
      font-size: 15px;
    }
    button {
      margin-top: 16px;
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      background: #6d7dff;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    code, pre {
      display: block;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      padding: 12px;
      border-radius: 8px;
      background: #0f131b;
      color: #cbd4ff;
    }
    .row {
      margin-top: 18px;
    }
    .status {
      min-height: 20px;
      margin-top: 12px;
      color: #93f0b6;
    }
    .error {
      color: #ff9b9b;
    }
  </style>
</head>
<body>
<main>
  <h1>Polus Config</h1>

  <form id="form">
    <label for="url">URL returned by /api/config</label>
    <input id="url" name="url" type="url" placeholder="https://www.google.com/" required>
    <button type="submit">Save URL</button>
    <div id="status" class="status"></div>
  </form>

  <div class="row">
    <label>Config URL for app</label>
    <code id="config-url"></code>
  </div>

  <div class="row">
    <label>Current config response</label>
    <pre id="preview">Loading...</pre>
  </div>
</main>

<script>
  const form = document.querySelector("#form");
  const input = document.querySelector("#url");
  const statusEl = document.querySelector("#status");
  const preview = document.querySelector("#preview");
  const configUrl = `${location.origin}/api/config`;

  document.querySelector("#config-url").textContent = configUrl;

  async function loadCurrent() {
    statusEl.textContent = "";
    statusEl.classList.remove("error");

    const response = await fetch("/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify({
        af_id: "panel-preview-af-id",
        push_token: "panel-preview-push-token",
        media_source: "panel"
      })
    });

    const data = await response.json();
    preview.textContent = JSON.stringify(data, null, 2);

    if (data.base_url) {
      input.value = data.base_url;
    }
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    statusEl.textContent = "Saving...";
    statusEl.classList.remove("error");

    try {
      const response = await fetch("/api/set", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({ url: input.value })
      });

      const data = await response.json();

      if (!response.ok || !data.ok) {
        throw new Error(data.error || "Save failed");
      }

      statusEl.textContent = "Saved.";
      await loadCurrent();
    } catch (error) {
      statusEl.textContent = error.message;
      statusEl.classList.add("error");
    }
  });

  loadCurrent().catch((error) => {
    preview.textContent = error.message;
    statusEl.textContent = error.message;
    statusEl.classList.add("error");
  });
</script>
</body>
</html>
